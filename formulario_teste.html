<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusão de Empresa do Grupo - Odontoprev</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; padding: 20px; margin: 0; }
        .container { max-width: 850px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header-banner { background-color: #0054a6; color: white; padding: 40px; text-align: center; }
        .header-banner h2 { margin: 0; font-size: 28px; font-weight: 600; }
        .form-content { padding: 40px; }
        .section { margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .section h3 { color: #0054a6; border-left: 5px solid #0054a6; padding-left: 15px; margin-bottom: 20px; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccd1d9; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.2s; }
        input:focus { border-color: #0054a6; box-shadow: 0 0 5px rgba(0,84,166,0.2); outline: none; }
        input[readonly] { background-color: #f9f9f9; color: #666; cursor: not-allowed; }
        
        .file-input-wrapper { margin-top: 10px; position: relative; display: flex; align-items: center; }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .custom-file-btn { display: inline-block; background-color: #0054a6; color: white; padding: 10px 20px; border-radius: 4px; font-weight: bold; font-size: 14px; text-align: center; z-index: 1; }
        .file-name { margin-left: 15px; font-size: 14px; color: #666; }

        .vida-item { background: #fdfdfd; padding: 25px; border-radius: 8px; margin-top: 15px; position: relative; border: 1px dashed #0054a6; }
        .btn { padding: 15px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; transition: all 0.3s ease; font-weight: bold; }
        .btn-add { background-color: #fff; color: #0054a6; border: 2px solid #0054a6; width: 100%; }
        .btn-submit { background-color: #0054a6; color: white; width: 100%; font-size: 20px; margin-top: 40px; }
        .btn-remove { background-color: #fff; color: #dc3545; font-size: 13px; padding: 5px 10px; position: absolute; top: 15px; right: 15px; border: 1px solid #dc3545; }
        .error-msg { color: #dc3545; background-color: #f8d7da; padding: 15px; border-radius: 6px; margin-top: 20px; display: none; border-left: 5px solid #dc3545; }
        .loading-msg { font-size: 12px; color: #0054a6; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h2>Inclusão de Empresa do Grupo - PME</h2>
    </div>
    
    <form id="propostaForm" class="form-content">
        <div class="section">
            <h3>Dados da Nova Sub</h3>
            <div class="grid-row">
                <div>
                    <label for="cnpj">CNPJ * <span id="loadCnpj" class="loading-msg">(Consultando...)</span></label>
                    <input type="text" id="cnpj" required placeholder="00.000.000/0001-00" maxlength="18" inputmode="numeric" oninput="execMasq(this, mCNPJ)" onblur="buscarCNPJ()">
                </div>
                <div>
                    <label for="razaoSocial">Razão Social *</label>
                    <input type="text" id="razaoSocial" required oninput="salvarProgresso()">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="nomeFantasia">Nome Fantasia</label>
                    <input type="text" id="nomeFantasia" oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="emailSub">E-mail da Nova Sub *</label>
                    <input type="email" id="emailSub" required oninput="salvarProgresso()">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="cnae">CNAE *</label>
                    <input type="text" id="cnae" required placeholder="0000-0/00" maxlength="9" oninput="execMasq(this, mCNAE); salvarProgresso()">
                </div>
                <div>
                    <label for="descCnae">Descrição do CNAE</label>
                    <input type="text" id="descCnae" oninput="salvarProgresso()">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="tel1">Telefone 1 *</label>
                    <input type="text" id="tel1" required placeholder="(11) 99999-9999" maxlength="15" oninput="execMasq(this, mTel); salvarProgresso()">
                </div>
                <div>
                    <label for="tel2">Telefone 2</label>
                    <input type="text" id="tel2" placeholder="(11) 99999-9999" maxlength="15" oninput="execMasq(this, mTel); salvarProgresso()">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="natJuridicaCod">Cód. Natureza Jurídica</label>
                    <input type="text" id="natJuridicaCod" oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="natJuridicaNome">Nome Natureza Jurídica</label>
                    <input type="text" id="natJuridicaNome" oninput="salvarProgresso()">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="dataConstituicao">Data da Constituição</label>
                    <input type="date" id="dataConstituicao" oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="situacaoCadastral">Situação Cadastral</label>
                    <input type="text" id="situacaoCadastral" readonly placeholder="Preenchido via Receita">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="subfatura">Número da Subfatura (Automático)</label>
                    <input type="text" id="subfatura" readonly placeholder="Aguardando CNPJ...">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Endereço da Sub</h3>
            <div class="grid-row" style="grid-template-columns: 0.5fr 1.5fr;">
                <div>
                    <label for="cep">CEP * <span id="loadCep" class="loading-msg">(Buscando...)</span></label>
                    <input type="text" id="cep" required placeholder="00000-000" maxlength="9" oninput="execMasq(this, mCEP)" onblur="buscarCEP()">
                </div>
                <div>
                    <label for="tipoLogradouro">Tipo de Logradouro</label>
                    <select id="tipoLogradouro" onchange="salvarProgresso()">
                        <option value="Rua">Rua</option>
                        <option value="Avenida">Avenida</option>
                        <option value="Alameda">Alameda</option>
                        <option value="Travessa">Travessa</option>
                    </select>
                </div>
            </div>
            <label for="endereco">Logradouro / Endereço *</label>
            <input type="text" id="endereco" required oninput="salvarProgresso()">
            <div class="grid-row">
                <div>
                    <label for="numero">Número *</label>
                    <input type="number" id="numero" required oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" oninput="salvarProgresso()">
                </div>
            </div>
            <div class="grid-row">
                <div>
                    <label for="bairro">Bairro *</label>
                    <input type="text" id="bairro" required oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="cidade">Cidade *</label>
                    <input type="text" id="cidade" required oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="uf">UF *</label>
                    <input type="text" id="uf" required maxlength="2" style="text-transform: uppercase;" oninput="salvarProgresso()">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Representante Legal</h3>
            <div class="grid-row">
                <div>
                    <label for="repNome">Nome do Representante *</label>
                    <input type="text" id="repNome" required oninput="salvarProgresso()">
                </div>
                <div>
                    <label for="repEmail">E-mail do Representante *</label>
                    <input type="email" id="repEmail" required oninput="salvarProgresso()">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Lista de Vidas (Mínimo 1)</h3>
            <div id="listaVidas"></div>
            <button type="button" class="btn btn-add" onclick="adicionarVida()">+ Adicionar Nova Vida</button>
            <div id="errorVidas" class="error-msg">⚠️ Atenção: Para prosseguir, cadastre no mínimo 1 vida.</div>
        </div>

        <div class="section" style="border-bottom: none;">
            <h3>Documentação Obrigatória</h3>
            <label>Contrato Social *</label>
            <div class="file-input-wrapper">
                <span class="custom-file-btn">Escolher arquivo</span>
                <span id="nameContrato" class="file-name">Nenhum arquivo selecionado</span>
                <input type="file" id="anexoContrato" accept=".pdf,.jpg,.png" required onchange="updateFileName(this, 'nameContrato')">
            </div>
            <label style="margin-top: 25px;">Cartão CNPJ *</label>
            <div class="file-input-wrapper">
                <span class="custom-file-btn">Escolher arquivo</span>
                <span id="nameCnpj" class="file-name">Nenhum arquivo selecionado</span>
                <input type="file" id="anexoCnpj" accept=".pdf,.jpg,.png" required onchange="updateFileName(this, 'nameCnpj')">
            </div>
        </div>

        <button type="submit" class="btn btn-submit">Finalizar e Enviar Proposta</button>
    </form>
</div>

<script>
    // --- MÁSCARAS ---
    function execMasq(o, f) { setTimeout(() => { o.value = f(o.value); }, 1); }
    function mCNPJ(v) { v = v.replace(/\D/g, ""); v = v.replace(/^(\d{2})(\d)/, "$1.$2"); v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3"); v = v.replace(/\.(\d{3})(\d)/, ".$1/$2"); v = v.replace(/(\d{4})(\d)/, "$1-$2"); return v; }
    function mCPF(v) { v = v.replace(/\D/g, ""); v = v.replace(/(\d{3})(\d)/, "$1.$2"); v = v.replace(/(\d{3})(\d)/, "$1.$2"); v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2"); return v; }
    function mCEP(v) { v = v.replace(/\D/g, ""); v = v.replace(/^(\d{5})(\d)/, "$1-$2"); return v; }
    function mTel(v) { v = v.replace(/\D/g, ""); v = v.replace(/^(\d{2})(\d)/g, "($1) $2"); v = v.replace(/(\d)(\d{4})$/, "$1-$2"); return v; }
    function mCNAE(v) { v = v.replace(/\D/g, ""); v = v.replace(/^(\d{4})(\d)/, "$1-$2"); v = v.replace(/(\d{1})(\d{2})$/, "$1/$2"); return v; }

    // --- LÓGICA RASCUNHO (48 HORAS) ---
    const STORAGE_KEY = 'rascunho_odontoprev_PME_v2';
    const EXPIRATION_TIME = 48 * 60 * 60 * 1000;

    function salvarProgresso() {
        const dados = {
            timestamp: new Date().getTime(),
            campos: {},
            vidas: Array.from(document.querySelectorAll('.vida-item')).map(div => ({
                nome: div.querySelector('input[name="nomeVida"]').value,
                cpf: div.querySelector('input[name="cpfVida"]').value
            }))
        };
        document.querySelectorAll('input:not([type="file"]), select').forEach(el => {
            if(el.id) dados.campos[el.id] = el.value;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
    }

    function carregarProgresso() {
        const rascunhoRaw = localStorage.getItem(STORAGE_KEY);
        if (!rascunhoRaw) return;
        const rascunho = JSON.parse(rascunhoRaw);
        if (new Date().getTime() - rascunho.timestamp > EXPIRATION_TIME) {
            localStorage.removeItem(STORAGE_KEY);
            return;
        }
        Object.keys(rascunho.campos).forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = rascunho.campos[id];
        });
        if (rascunho.vidas.length > 0) {
            document.getElementById('listaVidas').innerHTML = '';
            rascunho.vidas.forEach(v => {
                adicionarVida();
                const itens = document.querySelectorAll('.vida-item');
                const ultima = itens[itens.length - 1];
                ultima.querySelector('input[name="nomeVida"]').value = v.nome;
                ultima.querySelector('input[name="cpfVida"]').value = v.cpf;
            });
        }
    }

    // --- BUSCA CNPJ ---
    async function buscarCNPJ() {
        const cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
        if (cnpj.length !== 14) return;
        document.getElementById('loadCnpj').style.display = 'inline';
        try {
            const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            const data = await response.json();
            if(data.razao_social) {
                document.getElementById('razaoSocial').value = data.razao_social;
                document.getElementById('nomeFantasia').value = data.nome_fantasia || "";
                document.getElementById('situacaoCadastral').value = data.descricao_situacao_cadastral || "";
                document.getElementById('cnae').value = data.cnae_fiscal || "";
                document.getElementById('descCnae').value = data.cnae_fiscal_descricao || "";
                document.getElementById('natJuridicaCod').value = data.codigo_natureza_juridica || "";
                document.getElementById('natJuridicaNome').value = data.natureza_juridica || "";
                document.getElementById('subfatura').value = "Subfatura #" + (Math.floor(Math.random() * 8) + 2);
                salvarProgresso();
            }
        } catch (e) { console.error("Erro CNPJ"); }
        document.getElementById('loadCnpj').style.display = 'none';
    }

    async function buscarCEP() {
        const cepLimpo = document.getElementById('cep').value.replace(/\D/g, '');
        if (cepLimpo.length !== 8) return;
        document.getElementById('loadCep').style.display = 'inline';
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
            const data = await response.json();
            if(!data.erro) {
                document.getElementById('endereco').value = data.logradouro;
                document.getElementById('bairro').value = data.bairro;
                document.getElementById('cidade').value = data.localidade;
                document.getElementById('uf').value = data.uf;
                salvarProgresso();
            }
        } catch (e) {}
        document.getElementById('loadCep').style.display = 'none';
    }

    // --- VIDAS E ARQUIVOS ---
    let vidasCount = 0;
    function updateFileName(input, targetId) {
        document.getElementById(targetId).textContent = input.files.length > 0 ? input.files[0].name : "Nenhum arquivo selecionado";
    }

    function adicionarVida() {
        vidasCount++;
        const container = document.getElementById('listaVidas');
        const div = document.createElement('div');
        div.className = 'vida-item';
        div.id = `vida-${vidasCount}`;
        div.innerHTML = `
            <button type="button" class="btn btn-remove" onclick="removerVida(${vidasCount})">Remover</button>
            <label>Nome Completo *</label>
            <input type="text" name="nomeVida" required oninput="salvarProgresso()">
            <label>CPF *</label>
            <input type="text" name="cpfVida" required placeholder="000.000.000-00" maxlength="14" oninput="execMasq(this, mCPF); salvarProgresso()">
        `;
        container.appendChild(div);
        validarMinimoVidas();
    }

    function removerVida(id) { document.getElementById(`vida-${id}`).remove(); validarMinimoVidas(); salvarProgresso(); }
    
    function validarMinimoVidas() {
        const total = document.querySelectorAll('.vida-item').length;
        document.getElementById('errorVidas').style.display = total < 1 ? 'block' : 'none';
        return total >= 1;
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
    });

    // --- SUBMISSÃO ---
    document.getElementById('propostaForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!validarMinimoVidas()) return;

        const contratoInput = document.getElementById('anexoContrato');
        const cnpjInput = document.getElementById('anexoCnpj');

        if (!contratoInput.files[0] || !cnpjInput.files[0]) {
            alert("❌ Por favor, anexe os dois documentos obrigatórios.");
            return;
        }

        const dados = {
            sub: {
                cnpj: document.getElementById('cnpj').value,
                razaoSocial: document.getElementById('razaoSocial').value,
                nomeFantasia: document.getElementById('nomeFantasia').value,
                email: document.getElementById('emailSub').value,
                cnae: document.getElementById('cnae').value,
                descCnae: document.getElementById('descCnae').value,
                telefones: [document.getElementById('tel1').value, document.getElementById('tel2').value],
                naturezaJuridica: { cod: document.getElementById('natJuridicaCod').value, nome: document.getElementById('natJuridicaNome').value },
                dataConstituicao: document.getElementById('dataConstituicao').value,
                situacao: document.getElementById('situacaoCadastral').value,
                subfatura: document.getElementById('subfatura').value
            },
            endereco: {
                cep: document.getElementById('cep').value,
                tipo: document.getElementById('tipoLogradouro').value,
                logradouro: document.getElementById('endereco').value,
                numero: document.getElementById('numero').value,
                complemento: document.getElementById('complemento').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                uf: document.getElementById('uf').value
            },
            representante: { nome: document.getElementById('repNome').value, email: document.getElementById('repEmail').value },
            vidas: [],
            anexos: {
                contratoSocial: { nome: contratoInput.files[0].name, conteudo: await toBase64(contratoInput.files[0]) },
                cartaoCnpj: { nome: cnpjInput.files[0].name, conteudo: await toBase64(cnpjInput.files[0]) }
            }
        };

        const nomes = document.getElementsByName('nomeVida');
        const cpfs = document.getElementsByName('cpfVida');
        for (let i = 0; i < nomes.length; i++) {
            dados.vidas.push({ nome: nomes[i].value, cpf: cpfs[i].value });
        }

        const urlProxy = "https://fa-proxy-dynamics-poc-grhccjgmh7hzd2ht.brazilsouth-01.azurewebsites.net/api/EnviarPropostaProxy";
        fetch(urlProxy, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) })
        .then(res => {
            if(res.ok) {
                alert("✅ Proposta enviada com sucesso!");
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            } else { alert("❌ Erro no envio."); }
        })
        .catch(err => alert("❌ Erro de conexão."));
    });

    // Iniciar
    window.addEventListener('load', () => {
        carregarProgresso();
        if(document.querySelectorAll('.vida-item').length < 1) {
            adicionarVida();
        }
    });
</script>
</body>
</html>
